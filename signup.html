<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - FBI Digital Shield</title>
<style>
/* =========================
   T.B GLOBAL DESIGN SYSTEM
   (MATCHES INDEX.HTML EXACTLY)
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html { scroll-behavior: smooth; }

body {
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #1e1b4b, #020617);
    color: white;

    min-height: 100vh;
    overflow-x: hidden;
}

/* =========================
   SECTION WRAPPER (same feel as homepage sections)
========================= */

.section {
    position: fixed;
    inset: 0;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;

    overflow: hidden;
}

/* =========================
   AUTH CARD (SIGNUP / LOGIN CONTAINER)
========================= */

form {
    width: 100%;
    max-width: 380px;

    margin: 0 auto;
    
    position: relative;
    
    padding: 25px;

    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    backdrop-filter: blur(10px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* =========================
   INPUTS (MATCHES DARK GLASS STYLE)
========================= */

form input {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(0,0,0,0.2);
    color: white;
    border: 1px solid rgba(255,255,255,0.08);
}

form input:focus {
    border-color: #9333ea;
    background: rgba(255,255,255,0.08);
}

/* =========================
   BUTTON (EXACT SAME AS HOMEPAGE .primary)
========================= */

.primary {
    width: 100%;
    margin-top: 15px;
    background: linear-gradient(45deg, #9333ea, #ec4899);
    border: none;
    padding: 15px 25px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

/* =========================
   TEXT LINKS (MATCH HOMEPAGE STYLE)
========================= */

.section p {
    margin-top: 15px;
    color: #cbd5f5;
}

.section a {
    color: #e879f9;
    text-decoration: none;
}

/* =========================
   HEADINGS (MATCH HOMEPAGE H1 FEEL)
========================= */

.section h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* =========================
   SMALL UX IMPROVEMENTS
========================= */

form input::placeholder {
    color: #94a3b8;
}

form input:focus {
    transition: 0.2s ease;
}

.password-wrapper {
    position: relative;
    width: 100%;
}

.password-wrapper input{
    padding-right:50px;
}

.toggle-password {
    position: absolute;
    right: 14px;
    top: 50%;

    transform: translateY(-50%);

    background: none;
    border: none;

    color: #94a3b8;
    cursor: pointer;

    font-size: 16px;
}

.toggle-password:hover{
    color:white;
}

.remember-box {
    text-align: left;
    margin-top: 12px;
}

.remember-box label {
    display: flex;
    align-items: center;
    gap: 10px;

    font-size: 14px;
    color: #cbd5f5;

    cursor: pointer;

    padding: 10px 12px;
    border-radius: 10px;

    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
}

.remember-box input {
    width: 16px;
    height: 16px;
    accent-color: #9333ea;
}

</style>
</head>

<body>

<section class="section">
    <h2>Create Account</h2>

    <form onsubmit="signupUser(event)">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        
        <input type="text" id="country" placeholder="Country" required>

<input type="tel" id="phone" placeholder="Phone Number" required>
        
<div class="password-wrapper">
    <input type="password" id="password" placeholder="Password" required>

    <span class="toggle-password" onclick="togglePassword()">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
             width="22" height="22" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>

            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5
                     c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7
                     -4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
    </span>
</div>

<div class="remember-box">
    <label>
        <input type="checkbox" id="rememberMe">
        <span>Remember me</span>
    </label>
</div>

        <button class="primary">Sign Up</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("SUPABASE TEST:", typeof supabase);
</script>

<script src="assets/js/auth.js"></script>

<script>

async function signupUser(event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const country = document.getElementById("country").value;
    const phone = document.getElementById("phone").value;

    const role = email === "admin@tb.com" ? "admin" : "user";

    const { data, error } = await supabaseClient
        .from("users")
        .insert([{
            name,
            email,
            password,
            country,
            phone,
            role,
            balance: 0,
            status: "active",
            kyc_status: "NOT_SUBMITTED"
        }])
        .select()
        .single();

    if (error) {
        console.log(error);
        alert(error.message);
        return;
    }

    // 🔥 IMPORTANT: use REAL supabase user
    localStorage.setItem("tb_currentUser", JSON.stringify(data));

    alert("Account created successfully!");

    window.location.href =
        role === "admin"
            ? "admin.html"
            : "dashboard.html";
}

function togglePassword() {
    const password = document.getElementById("password");
    
    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}

</script>

</body>
</html>
