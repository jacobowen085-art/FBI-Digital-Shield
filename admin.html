<style>

padding:0;

.PENDING{

color:#facc15;
}

background:rgba(34,197,94,0.15);
color:#22c55e;
}

.REJECTED{

color:#ef4444;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

button{
padding:12px 15px;
border:none;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:600;
}

.primary{
background:linear-gradient(45deg,#9333ea,#ec4899);
}

.danger{
background:#ef4444;
}

.freeze{
background:#f59e0b;
}

.approve{
background:#22c55e;
}

.reject{
background:#ef4444;
}

input{
width:100%;
margin-top:15px;
padding:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.06);
color:white;
outline:none;
}

.modal{
position: fixed;
top: 0;
left: 0;
right: 0;
bottom: 0;
width: 100vw;
height: 100vh;

justify-content: center;
align-items: center;
padding: 20px;
z-index: 9999;
}

.modal-box{
width:100%;
max-width:500px;
max-height:80vh;
overflow-y:auto;
background:#111827;
border-radius:22px;
padding:25px;

</head>

<body>  <h1>T.B Admin Dashboard</h1>  <div class="dashboard-grid">  <div class="dashboard-card">

    <h2 id="totalUsers">0</h2>    
</div>    <div class="dashboard-card">    
    <h3>Total Balance</h3>

</div>    <div class="dashboard-card">    
    <h3>KYC Pending</h3>    
    <h2 id="pendingKYC">0</h2>    
</div>  </div>  <div class="users-container" id="usersContainer"></div>  <div class="modal" id="profileModal">  <div class="modal-box">    <h2 style="margin-bottom:20px;">User Profile</h2>    

<div id="profileContent"></div>    

<button class="danger" style="margin-top:20px;width:100%;" onclick="closeProfile()">    
    Close    
</button>

</div> 
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>  
let currentUser = getCurrentUser();

if (!currentUser || currentUser.role !== "admin") {
window.location.href = "login.html";
}

let users = [];

    async function refreshUsers() {
    users = await getUsers();
}


const container = document.getElementById("usersContainer");

function calculateStats() {

const totalUsers = users.length;    

let totalBalance = 0;    
let pendingKYC = 0;    

users.forEach(user => {    

    totalBalance += Number(user.balance || 0);    

    if (user.kycStatus === "PENDING") {    
        pendingKYC++;    
    }    
});    

document.getElementById("totalUsers").innerText = totalUsers;    

document.getElementById("totalBalance").innerText = "$" + totalBalance;    

document.getElementById("pendingKYC").innerText = pendingKYC;

}

async function getUsers() {
    const { data, error } = await supabaseClient
        .from("users")
        .select("*");
    
    if (error) {
        console.error(error);
        return [];
    }
    
    return data;
}

function saveUsers() {
    // Supabase is the only source of truth
}

async function loadUsers() {
    const { data, error } = await supabaseClient
        .from("users")
        .select("*");
    
    if (error) {
        console.error("Failed to load users:", error);
        return;
    }
    
    users = data || [];
    
    console.log("Users loaded:", users);
    
    calculateStats();
    renderUsers();
}

function updateUserBalance(userId, amount, type = "admin-credit") {
    const latestUsers = getUsers();

    let user = latestUsers.find(u => u.id === userId);

    if (!user) return;

    user.balance = (user.balance || 0) + amount;

    if (!user.transactions) user.transactions = [];

    user.transactions.push({
        type: type,
        amount: amount,
        method: "Admin Update",
        date: new Date().toLocaleString()
    });

    saveUsers(latestUsers);
}

function renderUsers() {
    console.log("renderUsers started");
    console.log("users value:", users);
console.log("is array:", Array.isArray(users));

    container.innerHTML = "";
    
    console.log("Users length:", users.length);

users.forEach(user => {
            console.log("Rendering user:", user);
     

    const card = document.createElement("div");    

    card.className = "user-card";    

    card.innerHTML = `    

        <h3>${user.name}</h3>    

        <p>Email: ${user.email}</p>    

        <p>Balance: $${user.balance || 0}</p>    

        <p>Status: ${user.status || "active"}</p>    

        <div class="status-badge ${user.kycStatus || "NOT_SUBMITTED"}">    
            ${user.kycStatus || "NOT_SUBMITTED"}    
        </div>    

        <input    
            type="number"    
            id="amount-${user.id}"    
            placeholder="Enter amount"    
        >

${
(user.pendingRequests && user.pendingRequests.length > 0)

? `

<div style="    
margin-top:20px;    
padding:15px;    
border-radius:16px;    
background:rgba(255,255,255,0.04);    
border:1px solid rgba(255,255,255,0.08);    
">    <h4 style="margin-bottom:15px;">    
Pending Secure Fund Requests    
</h4>    ${user.pendingRequests.map(req => `

<div style="    
padding:14px;    
margin-bottom:12px;    
border-radius:12px;    
background:rgba(0,0,0,0.2);    
">    <p><b>Amount:</b> $${req.amount}</p>    <p><b>Method:</b> ${req.method}</p>    <p><b>Status:</b> ${req.status}</p>    <p><b>Date:</b> ${req.date}</p>    <div class="actions">    <button
class="approve"
onclick="approveRequest(${user.id}, ${req.id})"

> 

Approve
</button>

<button
class="reject"
onclick="rejectRequest(${user.id}, ${req.id})"

> 

Reject
</button>

</div>    </div>    `).join("")}

</div>    `

: ""
}

<div class="actions">    

            <button class="primary" onclick="addBalance(${user.id})">    
                Add Balance    
            </button>    

            <button class="danger" onclick="removeBalance(${user.id})">    
                Remove Balance    
            </button>    

            <button class="freeze" onclick="toggleFreeze(${user.id})">    
                ${user.status === "frozen" ? "Unfreeze" : "Freeze"}    
            </button>    

            <button class="primary" onclick="viewProfile(${user.id})">    
                View Profile    
            </button>    

            <button class="danger" onclick="deleteUser(${user.id})">    
                Delete User    
            </button>    

            ${user.kycStatus === "PENDING" ? `    

                <button class="approve" onclick="approveKYC(${user.id})">    
                    Approve KYC    
                </button>    

                <button class="reject" onclick="rejectKYC(${user.id})">    
                    Reject KYC    
                </button>    

            ` : ""}    

        </div>    

    `;    

    container.appendChild(card);    
});

}

async function addBalance(userId) {
    const amount = parseFloat(
        document.getElementById("amount-" + userId).value
    );

    if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
    }

    // get current user from Supabase
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (error || !user) {
        alert("User not found");
        return;
    }

    const newBalance = Number(user.balance || 0) + amount;

    // update Supabase
    const { error: updateError } = await supabaseClient
        .from("users")
        .update({ balance: newBalance })
        .eq("id", userId);

    if (updateError) {
        console.error(updateError);
        alert("Failed to update balance");
        return;
    }

    await loadUsers();

    alert("Balance added successfully");
}

async function removeBalance(userId) {
    const amount = parseFloat(
        document.getElementById("amount-" + userId).value
    );

    if (!amount || amount <= 0) {
        alert("Enter valid amount");
        return;
    }

    // fetch latest user from Supabase
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (error || !user) {
        alert("User not found");
        return;
    }

    if ((user.balance || 0) < amount) {
        alert("Insufficient balance");
        return;
    }

    const newBalance = Number(user.balance || 0) - amount;

    const { error: updateError } = await supabaseClient
        .from("users")
        .update({ balance: newBalance })
        .eq("id", userId);

    if (updateError) {
        console.error(updateError);
        alert("Failed to update balance");
        return;
    }

    await loadUsers();

    alert("Balance removed successfully");
}

async function toggleFreeze(userId) {
    // fetch latest user
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (error || !user) {
        alert("User not found");
        return;
    }

    const newStatus =
        user.status === "frozen" ? "active" : "frozen";

    const { error: updateError } = await supabaseClient
        .from("users")
        .update({ status: newStatus })
        .eq("id", userId);

    if (updateError) {
        console.error(updateError);
        alert("Failed to update status");
        return;
    }

    await loadUsers();

    alert(`User ${newStatus === "frozen" ? "frozen" : "activated"}`);
}

async function approveKYC(userId) {
    const { error } = await supabaseClient
        .from("users")
        .update({ kycStatus: "APPROVED" })
        .eq("id", userId);

    if (error) {
        console.error(error);
        alert("Failed to approve KYC");
        return;
    }

    await loadUsers();

    alert("KYC approved successfully");
}

async function rejectKYC(userId) {
    const { error } = await supabaseClient
        .from("users")
        .update({ kycStatus: "REJECTED" })
        .eq("id", userId);

    if (error) {
        console.error(error);
        alert("Failed to reject KYC");
        return;
    }

    await loadUsers();

    alert("KYC rejected successfully");
}

async function deleteUser(userId) {
    const confirmDelete = confirm("Delete this user permanently?");
    if (!confirmDelete) return;
    
    const { error } = await supabaseClient
        .from("users")
        .delete()
        .eq("id", userId);
    
    if (error) {
        console.error(error);
        alert("Failed to delete user");
        return;
    }
    
    await loadUsers();
    
    alert("User deleted successfully");
}

function closeProfile() {

async function approveRequest(userId, requestId) {
    // 1. Get latest user
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (error || !user) {
        alert("User not found");
        return;
    }

    // 2. Find request
    const request = (user.pendingRequests || []).find(
        r => r.id == requestId
    );

    if (!request) {
        alert("Request not found");
        return;
    }

    // 3. Calculate new balance
    const newBalance =
        Number(user.balance || 0) + Number(request.amount);

    // 4. Build updated requests array
    const updatedRequests = user.pendingRequests.filter(
        r => r.id != requestId
    );

    // 5. Build transactions safely
    const updatedTransactions = user.transactions || [];

    updatedTransactions.push({
        id: Date.now(),
        type: "SECURE_FUNDS",
        amount: request.amount,
        method: request.method,
        status: "SUCCESS",
        date: new Date().toLocaleString()
    });

    // 6. Update Supabase (single atomic-style update)
    const { error: updateError } = await supabaseClient
        .from("users")
        .update({
            balance: newBalance,
            pendingRequests: updatedRequests,
            transactions: updatedTransactions
        })
        .eq("id", userId);

    if (updateError) {
        console.error(updateError);
        alert("Failed to approve request");
        return;
    }

    // 7. Refresh UI
    await loadUsers();

    alert("Request approved successfully");
}

async function rejectRequest(userId, requestId) {
    // get latest user from Supabase
    const { data: user, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("id", userId)
        .single();

    if (error || !user) {
        alert("User not found");
        return;
    }

    // remove request from array
    const updatedRequests = (user.pendingRequests || []).filter(
        r => r.id != requestId
    );

    // update Supabase
    const { error: updateError } = await supabaseClient
        .from("users")
        .update({
            pendingRequests: updatedRequests
        })
        .eq("id", userId);

    if (updateError) {
        console.error(updateError);
        alert("Failed to reject request");
        return;
    }

    await loadUsers();

    alert("Request rejected successfully");
}

(async function initDashboard() {
    await loadUsers();
})();

function downloadImage(url) {
    const img = new Image();
    img.src = url;
    document.body.appendChild(img);
    alert("Long press image to download");
}
